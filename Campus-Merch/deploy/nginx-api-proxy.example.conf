# 示例：前端静态站（如 8.140.x.x:6663）把 /api 反代到 Laravel 内网入口（natapp）。
# 复制到服务器 nginx 的 server { } 内按需改域名，并重载 nginx。
#
# 前端构建请使用：VITE_USE_MOCK=false 且 VITE_API_BASE_URL=/api
# Laravel 需在 config/cors.php（或等价）中允许该前端源的跨域（若非同源可忽略）。

location /api/ {
    proxy_pass http://mfbf86b9.natappfree.cc/api/;
    proxy_http_version 1.1;
    proxy_set_header Host mfbf86b9.natappfree.cc;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
